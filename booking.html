<!DOCTYPE html>
<html>
<head>
<title>Book Your Trip</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="heading">Travel Booking Form</h1>

<form class="booking-form">

<input type="text"
placeholder="Full Name"
required>

<input type="email"
placeholder="Email"
required>

<input type="tel"
placeholder="Phone Number"
required>

<select required>

<option>Select Destination</option>

<option>Goa</option>

<option>Manali</option>

<option>Kerala</option>

</select>

<input type="date">

<input type="number"
placeholder="Number of Travelers">

<select>

<option>Hotel Type</option>

<option>Budget</option>

<option>Standard</option>

<option>Luxury</option>

</select>

<button>
Confirm Booking
</button>

</form>
<form id="bookingForm">

    <input
        type="text"
        id="name"
        placeholder="Name">

    <input
        type="email"
        id="email"
        placeholder="Email">

    <input
        type="text"
        id="phone"
        placeholder="Phone">

    <select id="destination">

        <option>Goa</option>
        <option>Manali</option>
        <option>Kerala</option>

    </select>

    <input
        type="number"
        id="travelers"
        placeholder="Travelers">

    <input
        type="date"
        id="travelDate">

    <button type="submit">
        Book Now
    </button>

</form>

</body>
</html>
